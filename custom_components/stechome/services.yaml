import_history:
  name: Importar consumo histórico
  description: >
    Obtiene las lecturas diarias de un mes específico desde la API de Stechome
    e inyecta los datos en las estadísticas de Home Assistant para que aparezcan
    en el panel de Energía. Importa los meses en orden cronológico.
  target:
    entity:
      domain: sensor
      integration: stechome
  fields:
    year:
      name: Año
      description: "Año a importar (p.ej. 2026)."
      required: true
      example: 2026
      selector:
        number:
          min: 2020
          max: 2035
          step: 1
          mode: box
    month:
      name: Mes
      description: "Mes a importar como número (1 = enero … 12 = diciembre)."
      required: true
      example: 3
      selector:
        number:
          min: 1
          max: 12
          step: 1
          mode: box
